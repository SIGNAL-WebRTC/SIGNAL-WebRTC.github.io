<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — WebRTC Communicator</title>
<style>
  :root {
    --bg: #000;
    --surface: #0a0a0a;
    --panel: #111;
    --border: rgba(0,255,0,0.2);
    --border-bright: rgba(0,255,0,0.5);
    --accent: #0f0;
    --accent-dim: #0a0;
    --accent-glow: rgba(0,255,0,0.15);
    --danger: #f55;
    --warn: #fa0;
    --text: #0f0;
    --muted: #0a0;
    --dim: rgba(0,255,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: monospace;
    height: 100%;
    overflow: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: #000;
  }

  .logo {
    font-family: monospace;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,255,0,0.5);
  }

  .logo span {
    color: var(--muted);
    font-size: 9px;
    display: block;
    letter-spacing: 3px;
    font-weight: normal;
    margin-top: -2px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    font-family: monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Signaling status pill */
  .sig-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    font-family: monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.calling { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: blink 1s infinite; }
  .status-dot.in-call { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 1.5s infinite; }
  .status-dot.sig-ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.sig-err { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .status-dot.sig-connecting { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: blink 0.8s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section {
    padding: 14px 14px 10px;
  }

  .sidebar-label {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .id-card {
    background: #050505;
    border: 1px solid var(--border);
    padding: 12px;
    position: relative;
  }

  .id-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .id-label {
    font-family: monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .my-id {
    font-family: monospace;
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.6;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .my-id:hover { opacity: 0.6; }

  .copy-hint {
    font-family: monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 5px;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 1px;
  }
  .id-card:hover .copy-hint { opacity: 1; }

  .connect-input-wrap { display: flex; flex-direction: column; gap: 8px; }

  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  input[type="text"] {
    background: #050505;
    border: 1px solid var(--border);
    padding: 8px 10px;
    color: var(--accent);
    font-family: monospace;
    font-size: 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
  input[type="text"]::placeholder { color: rgba(0,170,0,0.4); }

  button, .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 14px;
    background: #000;
    color: var(--accent);
    border: 1px solid rgba(0,255,0,0.4);
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  button:hover, .btn:hover { background: var(--accent-glow); border-color: var(--accent); }
  button:disabled, .btn:disabled { opacity: 0.3; pointer-events: none; }

  .btn-primary { background: transparent; color: var(--accent); border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent); color: #000; box-shadow: 0 0 12px rgba(0,255,0,0.3); }
  .btn-secondary { color: var(--accent); border-color: rgba(0,255,0,0.3); }
  .btn-secondary:hover { background: var(--accent-glow); border-color: var(--accent); }
  .btn-danger { color: var(--danger); border-color: rgba(255,85,85,0.4); }
  .btn-danger:hover { background: rgba(255,85,85,0.1); border-color: var(--danger); }
  .btn-ghost { color: var(--muted); border-color: var(--border); }
  .btn-ghost:hover { color: var(--accent); border-color: rgba(0,255,0,0.4); }
  .btn-full { width: 100%; }
  .call-controls { display: flex; gap: 6px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }

  .divider { height: 1px; background: var(--border); }

  /* Signaling server config */
  .sig-config {
    background: #050505;
    border: 1px solid var(--border);
    padding: 10px;
    font-size: 10px;
  }
  .sig-config input {
    font-size: 10px;
    padding: 6px 8px;
  }
  .sig-config .field label { font-size: 8px; }

  /* ── MAIN ── */
  .main {
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  .video-area {
    position: relative;
    background: #020202;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #remoteVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    filter: sepia(0.1) hue-rotate(80deg) saturate(0.7);
  }

  #localVideo {
    position: absolute;
    bottom: 14px;
    right: 14px;
    width: 160px;
    height: 106px;
    object-fit: cover;
    border: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
    display: none;
    filter: sepia(0.1) hue-rotate(80deg) saturate(0.7);
  }

  .video-area::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(0,255,0,0.06);
    pointer-events: none;
    z-index: 1;
  }

  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 2;
    pointer-events: none;
  }
  .corner-tl { top: 8px; left: 8px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-tr { top: 8px; right: 8px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  .corner-bl { bottom: 8px; left: 8px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-br { bottom: 8px; right: 8px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

  .idle-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    text-align: center;
    z-index: 2;
  }

  .idle-icon {
    width: 72px;
    height: 72px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    background: #050505;
    position: relative;
  }

  .idle-icon::after {
    content: '';
    position: absolute;
    inset: -10px;
    border: 1px solid rgba(0,255,0,0.08);
    animation: ripple 3s infinite;
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .idle-title {
    font-family: monospace;
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(0,255,0,0.3);
  }

  .idle-sub {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    opacity: 0.5;
  }

  .incoming-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 20;
  }
  .incoming-overlay.show { display: flex; }

  .incoming-avatar {
    width: 80px;
    height: 80px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    animation: ring 1s ease infinite;
  }

  @keyframes ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,0,0.3); }
    50% { box-shadow: 0 0 0 24px rgba(0,255,0,0); }
  }

  .incoming-label {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .incoming-caller {
    font-family: monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 2px;
    max-width: 280px;
    text-align: center;
    word-break: break-all;
  }

  .incoming-actions { display: flex; gap: 14px; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { color: var(--accent); background: var(--accent-glow); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0,255,0,0.04); }

  .controls-panel {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px 20px;
    height: 90px;
  }
  .controls-panel.active { display: flex; }

  .btn-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(0,255,0,0.3);
    background: #000;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 16px;
    flex-shrink: 0;
    padding: 0;
  }
  .btn-icon:hover { border-color: var(--accent); background: var(--accent-glow); }
  .btn-icon.active { background: var(--accent-glow); border-color: var(--accent); box-shadow: 0 0 8px rgba(0,255,0,0.2); }
  .btn-icon.danger { background: rgba(255,85,85,0.1); border-color: rgba(255,85,85,0.5); }
  .btn-icon.danger:hover { background: rgba(255,85,85,0.2); border-color: var(--danger); }

  .timer {
    font-family: monospace;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 3px;
    min-width: 80px;
    text-align: center;
    text-shadow: 0 0 8px rgba(0,255,0,0.4);
  }

  .chat-panel {
    display: none;
    flex-direction: column;
    height: 260px;
  }
  .chat-panel.active { display: flex; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 72%;
    animation: msgIn 0.15s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg.them { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 8px 12px;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid var(--border);
  }

  .msg.me .msg-bubble {
    background: rgba(0,255,0,0.08);
    color: var(--accent);
    border-color: rgba(0,255,0,0.3);
  }

  .msg.them .msg-bubble {
    background: #050505;
    color: var(--muted);
    border-color: var(--border);
  }

  .msg-meta {
    font-family: monospace;
    font-size: 9px;
    color: rgba(0,170,0,0.5);
    letter-spacing: 1px;
  }

  .chat-input-row {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }

  .chat-input-row input { flex: 1; }

  .log {
    font-family: monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 6px 12px;
    max-height: 54px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    letter-spacing: 1px;
    line-height: 1.8;
    background: #000;
  }

  .log .entry { color: rgba(0,170,0,0.6); }
  .log .entry.ok { color: var(--accent); }
  .log .entry.err { color: var(--danger); }
  .log .entry.warn { color: var(--warn); }

  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #111;
    border: 1px solid var(--accent);
    padding: 10px 20px;
    font-family: monospace;
    font-size: 11px;
    color: var(--accent);
    z-index: 9999;
    transition: transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(0,255,0,0.15);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">SIGNAL<span>WEBRTC // AUTO MODE</span></div>
    <div class="header-right">
      <div class="sig-pill">
        <div class="status-dot sig-connecting" id="sigDot"></div>
        <span id="sigText">SIGNAL...</span>
      </div>
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">OFFLINE</span>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-scroll">

      <div class="sidebar-section">
        <div class="sidebar-label">NODE IDENTIFIER</div>
        <div class="id-card">
          <div class="id-label">PEER ID</div>
          <div class="my-id" id="myId" onclick="copyId()">INITIALIZING...</div>
          <div class="copy-hint">↑ CLICK TO COPY</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">CONNECT TO PEER</div>
        <div class="connect-input-wrap">
          <div class="field">
            <label>REMOTE PEER ID</label>
            <input type="text" id="remoteIdInput" placeholder="PASTE PEER ID..." />
          </div>
          <div class="call-controls mt-8">
            <button class="btn btn-primary" id="callBtn" onclick="startCall()" style="flex:1" disabled>[ CALL ]</button>
            <button class="btn btn-secondary" id="chatConnectBtn" onclick="connectChat()" style="flex:1" disabled>[ CHAT ]</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Signaling server config -->
      <div class="sidebar-section">
        <div class="sidebar-label">SIGNALING SERVER</div>
        <div class="sig-config">
          <div class="field" style="margin-bottom:8px">
            <label>WS URL</label>
            <input type="text" id="sigServerInput" value="wss://signal.peerjs.com/peerjs?key=peerjs&id=" placeholder="wss://..." />
          </div>
          <button class="btn btn-ghost btn-full" onclick="reconnectSignaling()" style="font-size:10px">RECONNECT</button>
        </div>
      </div>

    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="video-area">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay muted playsinline></video>

      <div class="idle-state" id="idleState">
        <div class="idle-icon">📡</div>
        <div class="idle-title">NO ACTIVE SESSION</div>
        <div class="idle-sub">ENTER PEER ID TO ESTABLISH LINK</div>
      </div>

      <div class="incoming-overlay" id="incomingOverlay">
        <div class="incoming-avatar">📞</div>
        <div class="incoming-label">INCOMING CONNECTION</div>
        <div class="incoming-caller" id="incomingCaller">UNKNOWN</div>
        <div class="incoming-actions">
          <button class="btn btn-primary" onclick="answerCall()">[ ACCEPT ]</button>
          <button class="btn btn-danger" onclick="rejectCall()">[ REJECT ]</button>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="tab-bar">
        <button class="tab active" id="tab-controls" onclick="switchTab('controls')">CALL CONTROLS</button>
        <button class="tab" id="tab-chat" onclick="switchTab('chat')">MESSAGES</button>
      </div>

      <div class="controls-panel active" id="panel-controls">
        <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Mute">🎙️</button>
        <button class="btn-icon" id="videoBtn" onclick="toggleVideo()" title="Camera">📷</button>
        <div class="timer" id="callTimer">--:--</div>
        <button class="btn-icon" id="screenBtn" onclick="toggleScreen()" title="Share Screen">🖥️</button>
        <button class="btn-icon danger" id="hangupBtn" onclick="hangUp()" title="Hang Up" style="display:none">📵</button>
      </div>

      <div class="chat-panel" id="panel-chat">
        <div class="messages" id="messages">
          <div class="msg them">
            <div class="msg-bubble">CONNECT TO A PEER TO START MESSAGING OVER WEBRTC DATA CHANNEL.</div>
            <div class="msg-meta">SYSTEM · NOW</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="TYPE MESSAGE..." onkeydown="if(event.key==='Enter')sendMsg()" />
          <button class="btn btn-primary" onclick="sendMsg()">SEND</button>
        </div>
      </div>

      <div class="log" id="logEl"></div>
    </div>

  </main>

</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let localStream    = null;
let peerConnection = null;
let dataChannel    = null;
let callTimer      = null;
let callStart      = null;
let muted          = false;
let videoOff       = false;
let screenSharing  = false;
let pendingOffer   = null;   // stored offer while user is in incoming overlay
let pendingCallerId = null;

// Signaling
let sigWS          = null;
let sigReady       = false;
let sigReconnTimer = null;
const SIG_BASE     = 'wss://signal.peerjs.com/peerjs';

const config = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

const myPeerId = generateId();

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function generateId() {
  return Array.from(crypto.getRandomValues(new Uint8Array(6)))
    .map(b => b.toString(16).padStart(2, '0')).join('-');
}

window.onload = () => {
  document.getElementById('myId').textContent = myPeerId;
  setStatus('online');
  log('NODE INITIALIZED · ID: ' + myPeerId, 'ok');

  document.getElementById('remoteIdInput').addEventListener('input', e => {
    const has = e.target.value.trim().length > 0;
    document.getElementById('callBtn').disabled = !has || !sigReady;
    document.getElementById('chatConnectBtn').disabled = !has || !sigReady;
  });

  connectSignaling();
};

// ─────────────────────────────────────────────
//  SIGNALING — PeerJS open protocol over WS
//  Messages: { type, src, dst, payload }
// ─────────────────────────────────────────────
function connectSignaling() {
  setSigStatus('connecting');
  const url = `${SIG_BASE}?key=peerjs&id=${myPeerId}&token=${Math.random().toString(36).slice(2)}`;
  sigWS = new WebSocket(url);

  sigWS.onopen = () => {
    log('SIGNALING CONNECTED', 'ok');
    setSigStatus('ok');
    sigReady = true;
    refreshCallButtons();
  };

  sigWS.onclose = () => {
    sigReady = false;
    setSigStatus('err');
    refreshCallButtons();
    log('SIGNALING DISCONNECTED — RETRYING IN 5s', 'warn');
    clearTimeout(sigReconnTimer);
    sigReconnTimer = setTimeout(connectSignaling, 5000);
  };

  sigWS.onerror = (e) => {
    log('SIGNALING ERROR', 'err');
    setSigStatus('err');
  };

  sigWS.onmessage = async (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    // PeerJS server sends {type:'OPEN'} on successful register
    if (msg.type === 'OPEN') {
      log('REGISTERED WITH SIGNALING SERVER', 'ok');
      return;
    }

    // Our custom signal messages are wrapped in msg.payload
    if (msg.type === 'OFFER') {
      const { sdp, callerId, videoCall } = msg.payload;
      pendingOffer    = sdp;
      pendingCallerId = callerId;
      document.getElementById('incomingCaller').textContent = callerId;
      document.getElementById('incomingOverlay').classList.add('show');
      setStatus('calling');
      log('INCOMING OFFER FROM ' + callerId, 'warn');
      toast('INCOMING CALL FROM ' + callerId);
    }

    if (msg.type === 'ANSWER') {
      if (!peerConnection) return;
      try {
        await peerConnection.setRemoteDescription(msg.payload.sdp);
        log('REMOTE ANSWER APPLIED — CONNECTING...', 'ok');
      } catch(e) { log('ANSWER ERROR: ' + e.message, 'err'); }
    }

    if (msg.type === 'ICE') {
      if (!peerConnection) return;
      try {
        await peerConnection.addIceCandidate(msg.payload.candidate);
      } catch(e) { /* ignore late candidates */ }
    }

    if (msg.type === 'REJECT') {
      log('CALL REJECTED BY PEER', 'warn');
      toast('CALL REJECTED');
      hangUp();
    }

    if (msg.type === 'HANGUP') {
      log('PEER ENDED CALL', 'warn');
      toast('PEER DISCONNECTED');
      hangUp();
    }

    // Chat-only offer
    if (msg.type === 'CHAT_OFFER') {
      pendingOffer    = msg.payload.sdp;
      pendingCallerId = msg.payload.callerId;
      // Auto-accept chat connections
      await acceptChatOffer();
    }

    if (msg.type === 'CHAT_ANSWER') {
      if (!peerConnection) return;
      try {
        await peerConnection.setRemoteDescription(msg.payload.sdp);
        log('CHAT CHANNEL NEGOTIATED', 'ok');
      } catch(e) { log('CHAT ANSWER ERROR: ' + e.message, 'err'); }
    }
  };
}

function reconnectSignaling() {
  if (sigWS) { sigWS.onclose = null; sigWS.close(); }
  clearTimeout(sigReconnTimer);
  connectSignaling();
}

// Send a signal to a remote peer via the PeerJS WS relay
function signal(dst, type, payload) {
  if (!sigWS || sigWS.readyState !== WebSocket.OPEN) {
    log('SIGNALING NOT READY', 'err');
    toast('SIGNALING NOT CONNECTED');
    return false;
  }
  sigWS.send(JSON.stringify({
    type: 'OFFER', // PeerJS wraps our messages as type OFFER
    dst,
    payload: { ...payload, _type: type }
  }));
  return true;
}

// PeerJS relay: send our typed message through the server
// The server will forward {type, src, dst, payload} to dst
function relay(dst, type, payload) {
  if (!sigWS || sigWS.readyState !== WebSocket.OPEN) return;
  // PeerJS protocol: client → server as JSON with type=OFFER
  // Server relays to dst as { type, src, dst, payload }
  sigWS.send(JSON.stringify({ type, dst, payload }));
}

// ─────────────────────────────────────────────
//  MEDIA
// ─────────────────────────────────────────────
async function getMedia(video = true) {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video });
    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('localVideo').style.display = 'block';
    log('LOCAL MEDIA ACQUIRED', 'ok');
    return localStream;
  } catch (e) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      log('CAMERA UNAVAILABLE, AUDIO ONLY', 'warn');
      return localStream;
    } catch (e2) {
      log('MEDIA ACCESS DENIED: ' + e2.message, 'err');
      toast('MICROPHONE ACCESS REQUIRED');
    }
  }
}

// ─────────────────────────────────────────────
//  PEER CONNECTION
// ─────────────────────────────────────────────
function createPeer(remotePeerId) {
  peerConnection = new RTCPeerConnection(config);

  // Trickle ICE — send candidates as they're gathered
  peerConnection.onicecandidate = e => {
    if (e.candidate) {
      relay(remotePeerId, 'ICE', { candidate: e.candidate });
    }
  };

  peerConnection.ontrack = e => {
    log('REMOTE TRACK RECEIVED', 'ok');
    document.getElementById('remoteVideo').srcObject = e.streams[0];
    document.getElementById('remoteVideo').style.display = 'block';
    document.getElementById('idleState').style.display = 'none';
    startCallTimer();
    setStatus('in-call');
    document.getElementById('hangupBtn').style.display = 'flex';
  };

  peerConnection.ondatachannel = e => {
    setupDataChannel(e.channel);
  };

  peerConnection.onconnectionstatechange = () => {
    const s = peerConnection.connectionState;
    log('CONNECTION: ' + s.toUpperCase(), s === 'connected' ? 'ok' : s === 'failed' ? 'err' : '');
    if (s === 'disconnected' || s === 'failed') {
      log('PEER CONNECTION LOST', 'err');
      toast('CONNECTION LOST');
      hangUp();
    }
  };

  if (localStream) {
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  }
  return peerConnection;
}

function setupDataChannel(ch) {
  dataChannel = ch;
  dataChannel.onopen  = () => { log('DATA CHANNEL OPEN', 'ok'); toast('CHAT CONNECTED'); };
  dataChannel.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'chat') addMessage(msg.text, 'them');
    } catch { addMessage(e.data, 'them'); }
  };
  dataChannel.onclose = () => log('DATA CHANNEL CLOSED', 'warn');
}

// ─────────────────────────────────────────────
//  CALL FLOW — AUTOMATED
// ─────────────────────────────────────────────
async function startCall() {
  const remoteId = document.getElementById('remoteIdInput').value.trim();
  if (!remoteId) { toast('ENTER A PEER ID'); return; }
  if (!sigReady) { toast('SIGNALING NOT CONNECTED'); return; }

  log('INITIATING CALL TO ' + remoteId + '...');
  setStatus('calling');

  await getMedia(true);
  createPeer(remoteId);
  dataChannel = peerConnection.createDataChannel('chat');
  setupDataChannel(dataChannel);

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  // Send offer automatically via signaling
  relay(remoteId, 'OFFER', { sdp: offer, callerId: myPeerId, videoCall: true });
  log('OFFER SENT TO ' + remoteId, 'ok');
  toast('CALLING ' + remoteId + '...');
}

async function answerCall() {
  document.getElementById('incomingOverlay').classList.remove('show');
  if (!pendingOffer || !pendingCallerId) return;

  const callerId = pendingCallerId;
  log('ANSWERING CALL FROM ' + callerId);

  await getMedia(true);
  createPeer(callerId);

  await peerConnection.setRemoteDescription(pendingOffer);
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  // Send answer automatically
  relay(callerId, 'ANSWER', { sdp: answer });
  log('ANSWER SENT TO ' + callerId, 'ok');
  toast('CONNECTING...');

  pendingOffer    = null;
  pendingCallerId = null;
}

function rejectCall() {
  document.getElementById('incomingOverlay').classList.remove('show');
  if (pendingCallerId) {
    relay(pendingCallerId, 'REJECT', {});
  }
  pendingOffer    = null;
  pendingCallerId = null;
  setStatus('online');
  log('CALL REJECTED', 'warn');
}

async function connectChat() {
  const remoteId = document.getElementById('remoteIdInput').value.trim();
  if (!remoteId) { toast('ENTER A PEER ID'); return; }

  log('CONNECTING CHAT CHANNEL TO ' + remoteId + '...');
  await getMedia(false);
  createPeer(remoteId);
  dataChannel = peerConnection.createDataChannel('chat');
  setupDataChannel(dataChannel);

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  relay(remoteId, 'CHAT_OFFER', { sdp: offer, callerId: myPeerId });
  log('CHAT OFFER SENT TO ' + remoteId, 'ok');
  toast('CHAT OFFER SENT...');
}

async function acceptChatOffer() {
  const callerId = pendingCallerId;
  log('AUTO-ACCEPTING CHAT FROM ' + callerId);
  await getMedia(false);
  createPeer(callerId);
  await peerConnection.setRemoteDescription(pendingOffer);
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  relay(callerId, 'CHAT_ANSWER', { sdp: answer });
  pendingOffer    = null;
  pendingCallerId = null;
}

function hangUp() {
  const remoteId = document.getElementById('remoteIdInput').value.trim();
  if (remoteId && sigReady) relay(remoteId, 'HANGUP', {});

  if (peerConnection) { peerConnection.close(); peerConnection = null; }
  if (localStream)    { localStream.getTracks().forEach(t => t.stop()); localStream = null; }

  document.getElementById('remoteVideo').style.display = 'none';
  document.getElementById('localVideo').style.display  = 'none';
  document.getElementById('idleState').style.display   = 'flex';
  document.getElementById('hangupBtn').style.display   = 'none';
  stopCallTimer();
  setStatus('online');
  log('CALL ENDED', 'warn');
  toast('CALL ENDED');
}

// ─────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────
function toggleMute() {
  if (!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇' : '🎙️';
  btn.classList.toggle('active', muted);
  log(muted ? 'MUTED' : 'UNMUTED', 'warn');
}

function toggleVideo() {
  if (!localStream) return;
  videoOff = !videoOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !videoOff);
  const btn = document.getElementById('videoBtn');
  btn.textContent = videoOff ? '🚫' : '📷';
  btn.classList.toggle('active', videoOff);
  log(videoOff ? 'CAMERA OFF' : 'CAMERA ON', 'warn');
}

async function toggleScreen() {
  if (!peerConnection) { toast('NOT IN A CALL'); return; }
  if (!screenSharing) {
    try {
      const screen = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const track  = screen.getVideoTracks()[0];
      const sender = peerConnection.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(track);
      track.onended = () => { screenSharing = false; document.getElementById('screenBtn').classList.remove('active'); };
      screenSharing = true;
      document.getElementById('screenBtn').classList.add('active');
      log('SCREEN SHARING STARTED', 'ok');
    } catch(e) { log('SCREEN SHARE DENIED', 'err'); }
  } else {
    const camTrack = localStream?.getVideoTracks()[0];
    if (camTrack) {
      const sender = peerConnection.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(camTrack);
    }
    screenSharing = false;
    document.getElementById('screenBtn').classList.remove('active');
    log('SCREEN SHARING STOPPED', 'warn');
  }
}

// ─────────────────────────────────────────────
//  CHAT
// ─────────────────────────────────────────────
function sendMsg() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;
  if (!dataChannel || dataChannel.readyState !== 'open') {
    toast('CHAT NOT CONNECTED YET');
    return;
  }
  dataChannel.send(JSON.stringify({ type: 'chat', text }));
  addMessage(text, 'me');
  input.value = '';
}

function addMessage(text, who) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ' + who;
  const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-meta">${who === 'me' ? 'YOU' : 'PEER'} · ${t}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function switchTab(name) {
  ['controls','chat'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
    document.getElementById('panel-'+n).classList.toggle('active', n===name);
  });
}

function setStatus(state) {
  const dot  = document.getElementById('statusDot');
  const txt  = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  const labels = { online: 'ONLINE', calling: 'CALLING...', 'in-call': 'IN CALL', offline: 'OFFLINE' };
  txt.textContent = labels[state] || state.toUpperCase();
}

function setSigStatus(state) {
  const dot  = document.getElementById('sigDot');
  const txt  = document.getElementById('sigText');
  dot.className = 'status-dot sig-' + state;
  const labels = { ok: 'SIGNAL OK', err: 'NO SIGNAL', connecting: 'SIGNAL...' };
  txt.textContent = labels[state] || state.toUpperCase();
}

function refreshCallButtons() {
  const has = document.getElementById('remoteIdInput').value.trim().length > 0;
  document.getElementById('callBtn').disabled = !has || !sigReady;
  document.getElementById('chatConnectBtn').disabled = !has || !sigReady;
}

function copyId() {
  navigator.clipboard.writeText(myPeerId).then(() => toast('PEER ID COPIED'));
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = '> ' + msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function log(msg, type = '') {
  const el   = document.getElementById('logEl');
  const span = document.createElement('span');
  span.className = 'entry ' + type;
  const t = new Date().toLocaleTimeString();
  span.textContent = `[${t}] ${msg}  `;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function startCallTimer() {
  callStart = Date.now();
  callTimer = setInterval(() => {
    const s   = Math.floor((Date.now() - callStart) / 1000);
    const m   = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    document.getElementById('callTimer').textContent = `${m}:${sec}`;
  }, 1000);
}

function stopCallTimer() {
  clearInterval(callTimer);
  document.getElementById('callTimer').textContent = '--:--';
}
</script>
